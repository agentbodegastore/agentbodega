name: Publish MCP package

on:
  push:
    tags:
      - "mcp-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish as a dry run"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate MCP registry metadata
        run: ./mcp-publisher validate server.json

      - name: Dry-run package
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm pack --dry-run

      - name: Check npm version
        id: npm-version
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          version="$(node -p "require('./package.json').version")"
          if npm view "@agentbodega/mcp@${version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)) && steps.npm-version.outputs.published != 'true'
        run: npm publish --access public

      - name: Authenticate to MCP Registry
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: ./mcp-publisher publish server.json
